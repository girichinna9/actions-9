name: Generate ASCII Artwork

on: push

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
    - name: Install Cowsay Program
      run: sudo apt-get install -y cowsay

    - name: Execute Cowsay CMD
      run: cowsay -f dragon "Run for cover, I am dragon.....RAWR" > dragon.txt
          
    - name: upload artifact text file
      uses: actions/upload-artifact@v4
      with:
        name: dragon-text-file
        path: dragon.txt

  Test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
    - name: Download artfact text file
      uses: action/download-artifact@v3
      with:
        name: dragon-text-file

    - name: Test file Exits
      run: grep -i "dragon" dragon.txt

  deploy_job_3: 
    needs: Test_job_2
    runs-on: ubuntu-latest
    steps:
    - name: Download artfact text file
      uses: action/download-artifact@v3
      with:
        name: dragon-text-file

    - name: Read dragon file
      run: cat dragon.txt

    - name: deploy
      run: echo "deploying..."